name: Deploy Exam Jingga via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      # 1. Ambil Kode Terbaru (Pakai v4 terbaru)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (v18 lebih stabil untuk Vite standar)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install Dependencies (Pakai ci biar cepat & identik dengan lokal)
      - name: Install Dependencies
        run: npm ci

      # 4. Build Project + Suntik Variable Supabase
      - name: Build Project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # 5. Kirim File ke Hosting (Pakai sistem Sync/Incremental dari script lama lu)
      - name: Kirim File ke Hosting via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: 21
          protocol: ftps
          local-dir: ./dist/
          server-dir: ./public_html/exam.smkn1rongga.sch.id/
          state-name: .ftp-deploy-sync-state.json
          dangerous-clean-slate: false