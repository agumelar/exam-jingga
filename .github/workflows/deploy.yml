name: Deploy Exam Jingga via SFTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      # 1. Ambil Kode Terbaru (Pakai v4 terbaru)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. Setup Node.js (v18 lebih stabil untuk Vite standar)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      # 3. Install Dependencies (Pakai ci biar cepat & identik dengan lokal)
      - name: Install Dependencies
        run: npm ci

      # 4. Build Project + Suntik Variable Supabase
      - name: Build Project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      # 5. Kirim File ke Hosting via SFTP (port 65002 - rekomendasi Niagahoster/Hostinger)
      - name: Kirim File ke Hosting via SFTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" \
            -e "set sftp:connect-program 'ssh -a -x -o StrictHostKeyChecking=no -p 65002'; \
                set net:max-retries 3; \
                set net:reconnect-interval-base 5; \
                mirror -R --delete --no-perms --parallel=2 ./dist/ /public_html/exam.smkn1rongga.sch.id/; \
                bye" \
            sftp://$FTP_SERVER