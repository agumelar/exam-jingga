name: Deploy Exam Jingga via FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Kirim File ke Hosting via FTP
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          RUNNER_PUBLIC_IP="$(curl -s ifconfig.me || true)"
          echo "Runner public IP: ${RUNNER_PUBLIC_IP:-unknown}"
          REMOTE_PATH="/public_html/exam.smkn1rongga.sch.id/"
          if ! nc -zvw 15 "$FTP_SERVER" 21; then
            echo "::error::Tidak bisa konek ke $FTP_SERVER:21 dari runner GitHub Actions."
            echo "::error::Pastikan port FTP terbuka dan IP runner di-whitelist."
            exit 1
          fi
          lftp -u "$FTP_USERNAME","$FTP_PASSWORD" \
            -e "set ftp:passive-mode true; \
                set net:timeout 20; \
                set net:max-retries 2; \
                set net:reconnect-interval-base 5; \
                mirror -R --delete --no-perms --parallel=2 ./dist/ $REMOTE_PATH; \
                bye" \
            ftp://$FTP_SERVER
