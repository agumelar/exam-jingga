name: Deploy Exam Jingga via SFTP/FTP

on:
  push:
    branches:
      - main

jobs:
  web-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Kirim File ke Hosting via SFTP/FTP fallback
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          sudo apt-get install -y lftp
          RUNNER_PUBLIC_IP="$(curl -s ifconfig.me || true)"
          echo "Runner public IP: ${RUNNER_PUBLIC_IP:-unknown}"
          REMOTE_PATH="/public_html/exam.smkn1rongga.sch.id/"
          
          if nc -zvw 15 "$FTP_SERVER" 65002; then
            echo "SFTP port 65002 reachable. Deploy via SFTP."
            lftp -u "$FTP_USERNAME","$FTP_PASSWORD" \
              -e "set sftp:connect-program 'ssh -p 65002 -o StrictHostKeyChecking=no'; \
                  set net:timeout 20; \
                  set net:max-retries 2; \
                  set net:reconnect-interval-base 5; \
                  mirror -R --delete --no-perms --parallel=2 ./dist/ $REMOTE_PATH; \
                  bye" \
              sftp://$FTP_SERVER
            exit 0
          fi

          echo "Port SFTP 65002 tidak bisa diakses, lanjut coba FTP di port 21..."
          if nc -zvw 15 "$FTP_SERVER" 21; then
            echo "FTP port 21 reachable. Deploy via FTP."
            lftp -u "$FTP_USERNAME","$FTP_PASSWORD" \
              -e "set ftp:passive-mode true; \
                  set net:timeout 20; \
                  set net:max-retries 2; \
                  set net:reconnect-interval-base 5; \
                  mirror -R --delete --no-perms --parallel=2 ./dist/ $REMOTE_PATH; \
                  bye" \
              ftp://$FTP_SERVER
            exit 0
          fi

          echo "::error::Tidak bisa koneksi ke $FTP_SERVER:65002 (SFTP) maupun :21 (FTP) dari runner GitHub Actions."
          echo "::error::IP publik runner saat ini: ${RUNNER_PUBLIC_IP:-unknown}. Pastikan IP ini sudah di-whitelist atau gunakan self-hosted runner dengan IP statis."
          exit 1
